<div class="row mb-3">
  <div class="col-sm-6">
    <h1 class="m-0">{{ isEdit ? 'Edit tenant' : 'New tenant' }}</h1>
  </div>
  <div class="col-sm-6 text-right">
    <a routerLink="/tenants" class="btn btn-default">Back to list</a>
  </div>
</div>

@if (loadError) {
  <div class="alert alert-danger">{{ loadError }}</div>
}

@if (!loadError) {
  @if (errorMessage) {
    <div class="alert alert-danger">{{ errorMessage }}</div>
  }

  <div class="card card-primary card-outline">
    <div class="card-header">
      <h3 class="card-title">Tenant</h3>
    </div>
    <form class="card-body" [formGroup]="form" (ngSubmit)="save()">
      <div class="form-group">
        <label>External party ID</label>
        <input type="text" class="form-control" formControlName="externalPartyId" />
      </div>
      <div class="form-group">
        <label>Display name</label>
        <input type="text" class="form-control" formControlName="displayName" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" formControlName="email" />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" class="form-control" formControlName="phone" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <input type="text" class="form-control" formControlName="status" placeholder="Optional label" />
      </div>
      <button type="submit" class="btn btn-primary" [disabled]="saveInFlight">
        {{ saveInFlight ? 'Saving…' : 'Save' }}
      </button>
      @if (isEdit) {
        <button type="button" class="btn btn-danger ml-2" [disabled]="deleteInFlight" (click)="delete()">
          {{ deleteInFlight ? 'Deleting…' : 'Delete' }}
        </button>
      }
    </form>
  </div>
}
