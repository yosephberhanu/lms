<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-white navbar-light border-bottom">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button" (click)="$event.preventDefault()"
          ><i class="fas fa-bars"></i
        ></a>
      </li>
    </ul>
    <span class="navbar-brand font-weight-light ml-2 d-none d-sm-inline">Admin</span>
    <ul class="navbar-nav ml-auto">
      <app-notification-bell allMessagesPath="/messages" />
      <li class="nav-item dropdown" [class.show]="menuOpen()">
        <a
          href="#"
          class="nav-link dropdown-toggle py-1"
          role="button"
          (click)="toggleMenu($event)"
          [attr.aria-expanded]="menuOpen()"
        >
          <i class="fas fa-user-circle mr-1"></i>
          {{ displayName() }}
        </a>
        <div class="dropdown-menu dropdown-menu-right" [class.show]="menuOpen()">
          <a routerLink="/profile" routerLinkActive="active" class="dropdown-item" (click)="closeMenu()">
            <i class="fas fa-user mr-2"></i>My profile
          </a>

          @if (portalSwitchTargets().length > 0) {
            <div class="dropdown-divider"></div>
            <h6 class="dropdown-header">Switch app</h6>
            @for (p of portalSwitchTargets(); track p.id) {
              <button type="button" class="dropdown-item" (click)="openPortal(p)">{{ p.label }}</button>
            }
          }

          <div class="dropdown-divider"></div>
          <button type="button" class="dropdown-item text-danger" (click)="logout(); closeMenu()">
            <i class="fas fa-sign-out-alt mr-2"></i>Log out
          </button>
        </div>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a routerLink="/users" class="brand-link">
      <span class="brand-text font-weight-light">LMS Admin</span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
          <li class="nav-item">
            <a routerLink="/users" routerLinkActive="active" class="nav-link">
              <i class="nav-icon fas fa-users-cog"></i>
              <p>Users</p>
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/messages" routerLinkActive="active" class="nav-link">
              <i class="nav-icon fas fa-envelope"></i>
              <p>Messages</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <div class="content pt-3">
      <div class="container-fluid">
        <router-outlet />
      </div>
    </div>
    <footer class="main-footer text-sm">
      <strong>LMS</strong> &mdash; user admin
    </footer>
  </div>
</div>
