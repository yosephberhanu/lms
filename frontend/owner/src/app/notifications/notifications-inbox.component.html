<div class="card card-outline card-secondary">
  <div class="card-header">
    <h3 class="card-title mb-0">Messages from LMS</h3>
  </div>
  <div class="card-body">
    @if (errorMessage) {
      <div class="alert alert-danger">{{ errorMessage }}</div>
    }
    @if (loading) {
      <p class="text-muted">Loading…</p>
    } @else if (rows.length === 0) {
      <p class="text-muted">No messages yet.</p>
    } @else {
      <div class="list-group">
        @for (n of rows; track n.id) {
          <div class="list-group-item" [class.bg-light]="!n.readAt">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h5 class="mb-1">{{ n.title }}</h5>
                <p class="mb-1 text-pre-wrap">{{ n.body }}</p>
                <small class="text-muted">{{ n.createdAt | date: 'medium' }}</small>
              </div>
              @if (!n.readAt) {
                <button
                  type="button"
                  class="btn btn-sm btn-outline-primary"
                  (click)="markRead(n)"
                  [disabled]="markingId === n.id"
                >
                  {{ markingId === n.id ? '…' : 'Mark read' }}
                </button>
              }
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
