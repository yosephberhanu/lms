<div class="wrapper" style="min-height: 100vh">
  <div class="content-wrapper" style="min-height: 100vh">
    <section class="content pt-5">
      <div class="container" style="max-width: 40rem">
        @if (missingTenant) {
          <div class="card card-outline card-danger">
            <div class="card-header">
              <h3 class="card-title mb-0">Tenant workspace</h3>
            </div>
            <div class="card-body">
              <p class="mb-3">
                You are signed in, but no tenant information is available.
              </p>
              <button type="button" class="btn btn-primary" (click)="logOut()">Log out and try another account</button>
            </div>
          </div>
        } @else {
          <div class="card card-outline card-primary">
            <div class="card-header">
              <h3 class="card-title mb-0">Tenant workspace</h3>
            </div>
            <div class="card-body">
              <p class="text-center text-muted mb-0">
                <i class="fas fa-spinner fa-spin mr-2" aria-hidden="true"></i>
                Opening workspace…
              </p>
            </div>
          </div>
        }
        @if (session.hasTenantId()) {
          <div class="text-center mt-3">
            <a routerLink="/dashboard" class="btn btn-primary">Continue to dashboard</a>
          </div>
        }
      </div>
    </section>
  </div>
</div>
