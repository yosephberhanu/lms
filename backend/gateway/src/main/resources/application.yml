server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: welcome-page
              uri: forward:/welcome-page
              predicates:
                - Path=/
            # Swagger UI (served under /property/...) requests the OpenAPI swagger-config
            # from /v3/api-docs/swagger-config at the gateway root. Route it to property.
            - id: property-openapi-root
              uri: "${GATEWAY_PROPERTY_URI:lb://property}"
              predicates:
                - Path=/v3/api-docs/**
            # Keep /property/ on localhost by redirecting at the gateway.
            # This avoids SpringDoc generating an absolute redirect to the service's internal host/IP.
            - id: property-root-redirect
              uri: no://op
              predicates:
                - Path=/property,/property/
              filters:
                - RedirectTo=302,/property/swagger-ui/index.html
            # Default: resolve PROPERTY via Eureka (lb://property). Override when debugging routing/DB mismatches, e.g.
            # GATEWAY_PROPERTY_URI=http://host.docker.internal:8081 (property on host, gateway in Docker).
            - id: property-service
              uri: "${GATEWAY_PROPERTY_URI:lb://property}"
              predicates:
                - Path=/property/**
              filters:
                - StripPrefix=1
                - PreserveHostHeader
                - AddRequestHeader=X-Forwarded-Prefix,/property
            # Lease OpenAPI: only under /lease so it does not steal /v3/api-docs from Property
            - id: lease-openapi-under-prefix
              uri: "${GATEWAY_LEASE_URI:lb://lease}"
              predicates:
                - Path=/lease/v3/api-docs/**
              filters:
                - StripPrefix=1
                - PreserveHostHeader
                - AddRequestHeader=X-Forwarded-Prefix,/lease
            # Keep /lease/ on localhost by redirecting at the gateway.
            # This avoids SpringDoc generating an absolute redirect to the service's internal host/IP.
            - id: lease-root-redirect
              order: -10
              uri: no://op
              predicates:
                - Path=/lease,/lease/
              filters:
                - RedirectTo=302,/lease/swagger-ui/index.html
            # Default: resolve LEASE via Eureka (lb://lease). Override when debugging routing/DB mismatches, e.g.
            # GATEWAY_LEASE_URI=http://host.docker.internal:8082 (lease on host, gateway in Docker).
            - id: lease-service
              uri: "${GATEWAY_LEASE_URI:lb://lease}"
              predicates:
                - Path=/lease/**
              filters:
                - StripPrefix=1
                - PreserveHostHeader
                - AddRequestHeader=X-Forwarded-Prefix,/lease

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
