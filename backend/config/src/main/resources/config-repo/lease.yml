server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: lease
  datasource:
    url: jdbc:postgresql://postgres:5432/lease_db
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

eureka:
  client:
    service-url:
      defaultZone: http://registry:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: ../v3/api-docs
    config-url: ../v3/api-docs/swagger-config
    use-root-path: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

lease:
  property-service:
    # Property service listens on server.port 8080 inside the container (see property/application.yml).
    base-url: http://property:8080
  user-service:
    base-url: ""
